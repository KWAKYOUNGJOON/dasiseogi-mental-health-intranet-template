#
# The root `docker-compose.yml` already includes the default local
# multi-container stack (`db` / `backend` / `frontend`).
# This file is intentionally a no-op so older commands like
# `docker compose -f docker-compose.yml -f docker-compose.local-db.yml up -d --build`
