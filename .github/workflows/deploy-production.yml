name: Build And Deploy Production

on:
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: Deploy backend jar
        required: true
        default: true
        type: boolean
      deploy_frontend:
        description: Deploy frontend dist
        required: true
        default: true
        type: boolean
      run_backup:
        description: Run DB dump backup before backend deploy
        required: true
        default: true
        type: boolean
      run_health_check:
        description: Run health check after deployment
        required: true
        default: true
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend jar
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon test bootJar

      - name: Prepare backend artifact
        run: |
          mkdir -p release/backend
          jar_path="$(find backend/build/libs -maxdepth 1 -name '*.jar' ! -name '*-plain.jar' | head -n 1)"
          if [ -z "$jar_path" ]; then
            echo "Backend jar artifact was not produced." >&2
            exit 1
          fi
          cp "$jar_path" release/backend/mental-health-app.jar

      - name: Build frontend dist
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Prepare frontend artifact
        run: |
          mkdir -p release/frontend
          cp -R frontend/dist release/frontend/dist

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-release
          path: release/backend/mental-health-app.jar
          if-no-files-found: error

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-release
          path: release/frontend/dist
          if-no-files-found: error

  deploy:
    name: Deploy to production
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - windows
      - x64
    environment: production
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-release
          path: .artifacts/backend

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-release
          path: .artifacts/frontend

      - name: Validate production configuration
        env:
          APP_HOME: ${{ vars.APP_HOME }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:APP_HOME)) {
            throw "GitHub Environment variable APP_HOME is required."
          }
          if (-not (Test-Path -LiteralPath $env:APP_HOME)) {
            throw "APP_HOME path was not found: $env:APP_HOME"
          }

      - name: Deploy release artifacts
        env:
          APP_HOME: ${{ vars.APP_HOME }}
          APP_HEALTHCHECK_URL: ${{ vars.APP_HEALTHCHECK_URL }}
          APP_BACKEND_STOP_COMMAND_PWSH: ${{ vars.APP_BACKEND_STOP_COMMAND_PWSH }}
          APP_BACKEND_START_COMMAND_PWSH: ${{ vars.APP_BACKEND_START_COMMAND_PWSH }}
          APP_FRONTEND_POST_DEPLOY_COMMAND_PWSH: ${{ vars.APP_FRONTEND_POST_DEPLOY_COMMAND_PWSH }}
          APP_BACKUP_ROOT_PATH: ${{ vars.APP_BACKUP_ROOT_PATH }}
          APP_DB_DUMP_COMMAND: ${{ vars.APP_DB_DUMP_COMMAND }}
          APP_DB_URL: ${{ secrets.APP_DB_URL }}
          APP_DB_USERNAME: ${{ secrets.APP_DB_USERNAME }}
          APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
          DEPLOY_BACKEND: ${{ inputs.deploy_backend }}
          DEPLOY_FRONTEND: ${{ inputs.deploy_frontend }}
          RUN_BACKUP: ${{ inputs.run_backup }}
          RUN_HEALTH_CHECK: ${{ inputs.run_health_check }}
        run: |
          $backendJar = (Resolve-Path '.artifacts/backend/mental-health-app.jar').Path
          $frontendDist = (Resolve-Path '.artifacts/frontend/dist').Path
          $scriptPath = Join-Path $PWD 'scripts\deploy-from-github-actions.ps1'

          $arguments = @(
            '-BackendJarPath', $backendJar,
            '-FrontendDistPath', $frontendDist
          )

          if ($env:DEPLOY_BACKEND -eq 'true') {
            $arguments += '-DeployBackend'
          }
          if ($env:DEPLOY_FRONTEND -eq 'true') {
            $arguments += '-DeployFrontend'
          }
          if ($env:RUN_BACKUP -eq 'true') {
            $arguments += '-RunBackup'
          }
          if ($env:RUN_HEALTH_CHECK -eq 'true') {
            $arguments += '-RunHealthCheck'
          }

          & $scriptPath @arguments
