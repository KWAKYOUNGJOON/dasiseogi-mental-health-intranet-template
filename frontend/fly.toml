# Review both app names before the first deploy. Fly app names must be globally unique.
app = "dasiseogi-mental-health-intranet-template-web"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  BACKEND_UPSTREAM_URL = "https://dasiseogi-mental-health-intranet-template-dry-sea-7928.fly.dev"

[http_service]
  internal_port = 4173
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpus = 1
  memory_mb = 256
