services:
  backend:
    build:
      context: ./backend
    image: dasiseogi-backend:local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_DB_URL_DOCKER: ${APP_DB_URL_DOCKER:-}
      APP_DB_USERNAME: ${APP_DB_USERNAME:-}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-}
      APP_DB_DRIVER: ${APP_DB_DRIVER:-}
      APP_LOG_FILE_PATH: /data/logs
      APP_EXPORT_TEMP_PATH: /data/tmp/exports
      APP_BACKUP_ROOT_PATH: /data/backups
    volumes:
      - type: bind
        source: ${BACKEND_LOGS_HOST_PATH:-./logs}
        target: /data/logs
      - type: bind
        source: ${BACKEND_TMP_HOST_PATH:-./tmp}
        target: /data/tmp
      - type: bind
        source: ${BACKEND_BACKUPS_HOST_PATH:-./local-backups}
        target: /data/backups
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/v1/health > /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    image: dasiseogi-frontend:local
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4173:4173"
