services:
  backend:
    build:
      context: ./backend
    image: dasiseogi-backend:local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      APP_DB_URL: ${APP_DB_URL_DOCKER:-jdbc:mariadb://host.docker.internal:3306/DB_NAME_PLACEHOLDER}
      APP_DB_USERNAME: ${APP_DB_USERNAME:-DB_USERNAME_PLACEHOLDER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-DB_PASSWORD_PLACEHOLDER}
      APP_DB_DRIVER: ${APP_DB_DRIVER:-org.mariadb.jdbc.Driver}
      APP_LOG_FILE_PATH: /data/logs
      APP_EXPORT_TEMP_PATH: /data/tmp/exports
      APP_BACKUP_ROOT_PATH: /data/backups
    volumes:
      - type: bind
        source: ${BACKEND_LOGS_HOST_PATH:-./logs}
        target: /data/logs
      - type: bind
        source: ${BACKEND_TMP_HOST_PATH:-./tmp}
        target: /data/tmp
      - type: bind
        source: ${BACKEND_BACKUPS_HOST_PATH:-./local-backups}
        target: /data/backups
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    image: dasiseogi-frontend:local
    depends_on:
      - backend
    ports:
      - "4173:4173"
