name: dasiseogi-mental-health-intranet-template

services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Seoul}
      MARIADB_DATABASE: ${LOCAL_DB_NAME:-mental_health_local}
      MARIADB_USER: ${LOCAL_DB_USERNAME:-mental_user}
      MARIADB_PASSWORD: ${LOCAL_DB_PASSWORD:-mental_pass}
      MARIADB_ROOT_PASSWORD: ${LOCAL_DB_ROOT_PASSWORD:-mental_root_pass}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - local_db_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - mariadb-admin ping -h 127.0.0.1 -uroot -p$$MARIADB_ROOT_PASSWORD --silent || exit 1
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  backend:
    restart: unless-stopped
    build:
      context: ./backend
      args:
        APP_SERVER_PORT: ${APP_SERVER_PORT:-8080}
    image: dasiseogi-backend:local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      APP_SERVER_PORT: ${APP_SERVER_PORT:-8080}
      APP_DB_URL_DOCKER: jdbc:mariadb://db:3306/${LOCAL_DB_NAME:-mental_health_local}?useUnicode=true&characterEncoding=utf8
      APP_DB_USERNAME: ${LOCAL_DB_USERNAME:-mental_user}
      APP_DB_PASSWORD: ${LOCAL_DB_PASSWORD:-mental_pass}
      APP_DB_DRIVER: ${APP_DB_DRIVER:-org.mariadb.jdbc.Driver}
      APP_SESSION_TIMEOUT: ${APP_SESSION_TIMEOUT:-120m}
      APP_FORWARD_HEADERS_STRATEGY: ${APP_FORWARD_HEADERS_STRATEGY:-none}
      APP_TRUST_PROXY_HEADERS: ${APP_TRUST_PROXY_HEADERS:-false}
      APP_HEALTHCHECK_PATH: ${APP_HEALTHCHECK_PATH:-/api/v1/health}
      APP_DB_DUMP_COMMAND: ${APP_DB_DUMP_COMMAND:-}
      APP_LOG_FILE_PATH: /data/logs
      APP_EXPORT_TEMP_PATH: /data/tmp/exports
      APP_BACKUP_ROOT_PATH: /data/backups
    volumes:
      - type: bind
        source: ${BACKEND_LOGS_HOST_PATH:-./logs}
        target: /data/logs
      - type: bind
        source: ${BACKEND_TMP_HOST_PATH:-./tmp}
        target: /data/tmp
      - type: bind
        source: ${BACKEND_BACKUPS_HOST_PATH:-./local-backups}
        target: /data/backups
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:${APP_SERVER_PORT:-8080}${APP_HEALTHCHECK_PATH:-/api/v1/health} > /dev/null || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      - "${APP_SERVER_PORT:-8080}:${APP_SERVER_PORT:-8080}"

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      args:
        APP_FRONTEND_PORT: ${APP_FRONTEND_PORT:-4173}
    image: dasiseogi-frontend:local
    depends_on:
      backend:
        condition: service_healthy
    environment:
      APP_FRONTEND_PORT: ${APP_FRONTEND_PORT:-4173}
      APP_BACKEND_UPSTREAM_HOST: ${APP_BACKEND_UPSTREAM_HOST:-backend}
      APP_BACKEND_UPSTREAM_PORT: ${APP_SERVER_PORT:-8080}
    ports:
      - "${APP_FRONTEND_PORT:-4173}:${APP_FRONTEND_PORT:-4173}"

volumes:
  local_db_data:
