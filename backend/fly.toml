# Review the app name before the first deploy. Fly app names must be globally unique.
app = "dasiseogi-mental-health-intranet-template-dry-sea-7928"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_SERVER_PORT = "8080"
  APP_SESSION_TIMEOUT = "120m"
  APP_FORWARD_HEADERS_STRATEGY = "framework"
  APP_TRUST_PROXY_HEADERS = "true"
  APP_LOG_FILE_PATH = "/data/logs"
  APP_EXPORT_TEMP_PATH = "/data/tmp/exports"
  APP_BACKUP_ROOT_PATH = "/data/backups"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "data"
  destination = "/data"
  initial_size = "3gb"

[[vm]]
  memory = "1gb"
  cpus = 1
  memory_mb = 1024
