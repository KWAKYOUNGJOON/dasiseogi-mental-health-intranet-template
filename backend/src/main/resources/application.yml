server:
  port: 8080
  servlet:
    session:
      timeout: 120m

spring:
  datasource:
    url: jdbc:h2:file:./backend/data/defaultdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    com.dasisuhgi.mentalhealth: INFO

app:
  backup:
    root-path: ./local-backups
  seed:
    enabled: true
