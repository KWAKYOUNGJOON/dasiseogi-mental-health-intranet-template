server:
  port: 8080
  servlet:
    session:
      timeout: 120m

spring:
  datasource:
    url: ${APP_DB_URL:}
    username: ${APP_DB_USERNAME:}
    password: ${APP_DB_PASSWORD:}
    driver-class-name: ${APP_DB_DRIVER:}
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    com.dasisuhgi.mentalhealth: INFO

app:
  organization:
    name: 다시서기 정신건강 평가관리 시스템
  scale:
    resource-path: classpath:scales
  export:
    temp-path: ./tmp/exports
  backup:
    root-path: ./local-backups
    db-dump-command:
    auto:
      enabled: true
      cron: 0 0 2 * * *
      zone: Asia/Seoul
  restore:
    root-path: ./tmp/restores
    max-upload-size-bytes: 524288000
    db-import-command:
    db-import-timeout-seconds: 60
  security:
    trust-proxy-headers: false
  seed:
    enabled: false
