server:
  servlet:
    session:
      timeout: 120m

spring:
  profiles:
    default: test
  datasource:
    url: jdbc:h2:mem:mentalhealth-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: WARN
    com.dasisuhgi.mentalhealth: INFO

app:
  seed:
    enabled: true
